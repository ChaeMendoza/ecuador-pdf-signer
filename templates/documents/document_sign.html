{% extends 'base.html' %}

{% block content %}
<style>
    .sign-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: flex-start;
        margin-top: 20px;
    }
    .pdf-viewer-container {
        border: 1px solid #ccc;
        background: #f8f9fa;
        padding: 10px;
        position: relative;
        flex: 1;
        min-width: 400px;
        overflow: auto;
    }
    .pdf-controls {
        margin-bottom: 10px;
        text-align: center;
    }
    #pdf-wrapper {
        position: relative;
        display: inline-block;
        margin: 0 auto;
    }
    #pdf-render {
        border: 1px solid #000;
        cursor: crosshair;
        display: block;
    }
    #signature-box {
        position: absolute;
        border: 2px dashed #004d99;
        background: rgba(0, 77, 153, 0.2);
        display: none;
        pointer-events: none;
        box-sizing: border-box;
    }
    #signature-box::after {
        content: "Firma aquí";
        color: #004d99;
        font-weight: bold;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        opacity: 0.7;
    }
    .form-container {
        flex: 0 0 300px;
        background: white;
        padding: 15px;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
</style>

<h2>Firmar Documento: {{ document.original_file.name }}</h2>

<div class="sign-container">
    <div class="form-container">
        <h3>1. Ubica tu firma</h3>
        <p style="font-size: 14px; color: #555;">Navega por el documento y haz clic en la página donde deseas colocar tu firma visible.</p>
        
        <h3>2. Certificado digital</h3>
        <form method="post" enctype="multipart/form-data" id="sign-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn" id="btn-submit" style="width: 100%; margin-top: 10px;">Firmar Documento</button>
            <a href="{% url 'document_list' %}" class="btn btn-danger" style="width: 100%; margin-top: 10px; text-align: center; display: block; box-sizing: border-box;">Cancelar</a>
        </form>
    </div>

    <div class="pdf-viewer-container">
        <div class="pdf-controls">
            <button type="button" class="btn" id="prev-page">Anterior</button>
            <span style="margin: 0 15px; font-weight: bold;">Página: <span id="page-num"></span> / <span id="page-count"></span></span>
            <button type="button" class="btn" id="next-page">Siguiente</button>
        </div>
        <div style="text-align: center;">
            <div id="pdf-wrapper">
                <canvas id="pdf-render"></canvas>
                <div id="signature-box"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    // Configuración de pdf.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const url = '{{ document.original_file.url }}';
    
    let pdfDoc = null,
        pageNum = 1,
        pageIsRendering = false,
        pageNumIsPending = null,
        scale = 1.2,
        canvas = document.getElementById('pdf-render'),
        ctx = canvas.getContext('2d'),
        signatureBox = document.getElementById('signature-box');

    // Dimensiones en puntos PDF (1pt = 1/72 inch)
    const SIGNATURE_WIDTH_PT = 200;
    const SIGNATURE_HEIGHT_PT = 50;

    const renderPage = num => {
        pageIsRendering = true;

        pdfDoc.getPage(num).then(page => {
            const viewport = page.getViewport({ scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderCtx = {
                canvasContext: ctx,
                viewport: viewport
            };

            page.render(renderCtx).promise.then(() => {
                pageIsRendering = false;

                if (pageNumIsPending !== null) {
                    renderPage(pageNumIsPending);
                    pageNumIsPending = null;
                }
            });

            document.getElementById('page-num').textContent = num;
            
            // Ocultar caja si cambiamos de página y la firma no está aquí
            const savedPage = document.getElementById('id_page').value;
            if (parseInt(savedPage) !== num) {
                signatureBox.style.display = 'none';
            } else {
                signatureBox.style.display = 'block';
            }
        });
    };

    const queueRenderPage = num => {
        if (pageIsRendering) {
            pageNumIsPending = num;
        } else {
            renderPage(num);
        }
    };

    const showPrevPage = () => {
        if (pageNum <= 1) return;
        pageNum--;
        queueRenderPage(pageNum);
    };

    const showNextPage = () => {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        queueRenderPage(pageNum);
    };

    pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        renderPage(pageNum);
    }).catch(err => {
        console.error('Error cargando el PDF: ', err);
    });

    document.getElementById('prev-page').addEventListener('click', showPrevPage);
    document.getElementById('next-page').addEventListener('click', showNextPage);

    // Seleccionar posición de la firma al hacer clic en el canvas
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        
        // Coordenadas relativas al canvas (esquina superior izquierda)
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        // Tamaño visual de la caja
        const boxWidth = SIGNATURE_WIDTH_PT * scale;
        const boxHeight = SIGNATURE_HEIGHT_PT * scale;

        // Ajustar posición para que la caja no se salga del canvas
        let boxX = clickX;
        let boxY = clickY;

        if (boxX + boxWidth > canvas.width) boxX = canvas.width - boxWidth;
        if (boxY + boxHeight > canvas.height) boxY = canvas.height - boxHeight;

        // Mostrar la caja en el navegador
        signatureBox.style.width = boxWidth + 'px';
        signatureBox.style.height = boxHeight + 'px';
        signatureBox.style.left = boxX + 'px';
        signatureBox.style.top = boxY + 'px';
        signatureBox.style.display = 'block';

        // Convertir a coordenadas PDF (origen en esquina inferior izquierda, tamaño original sin escala)
        const pdf_x = boxX / scale;
        const pdf_y_top = boxY / scale;
        const pdf_viewport_height = canvas.height / scale;
        
        // Y en PDF es la esquina inferior izquierda de la caja
        const pdf_y_bottom = pdf_viewport_height - pdf_y_top - SIGNATURE_HEIGHT_PT;

        // Asignar los valores a los inputs ocultos del formulario
        document.getElementById('id_page').value = pageNum;
        document.getElementById('id_x').value = pdf_x.toFixed(2);
        document.getElementById('id_y').value = pdf_y_bottom.toFixed(2);
        document.getElementById('id_width').value = SIGNATURE_WIDTH_PT;
        document.getElementById('id_height').value = SIGNATURE_HEIGHT_PT;
    });
</script>
{% endblock %}
