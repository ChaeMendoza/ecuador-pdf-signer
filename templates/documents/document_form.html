{% extends 'base.html' %}

{% block content %}
<h2>Subir Documento PDF</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Subir Documento</button>
    <a href="{% url 'document_list' %}" class="btn btn-danger">Cancelar</a>
</form>
{% endblock %}
